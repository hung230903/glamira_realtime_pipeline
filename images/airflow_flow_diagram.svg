<svg width="1000" height="800" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="800" fill="#0f172a" rx="15" />
  
  <!-- Definitions for Gradients and Shadows -->
  <defs>
    <linearGradient id="grad-airflow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-kafka" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-postgres" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-monitoring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Titles -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">Airflow Streaming Data Pipeline Flow</text>
  <text x="500" y="70" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Universal Mesh Monitoring &amp; Orchestration</text>

  <!-- --- NODES --- -->

  <!-- Airflow Container -->
  <rect x="50" y="100" width="900" height="200" rx="15" fill="#1e293b" stroke="#334155" stroke-dasharray="5,5" />
  <text x="70" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#94a3b8">Airflow Orchestrator</text>

  <!-- Airflow DAGs Row 1 -->
  <g filter="url(#shadow)">
    <rect x="80" y="150" width="180" height="50" rx="8" fill="url(#grad-airflow)" />
    <text x="170" y="180" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">spark_job_control</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="150" width="180" height="50" rx="8" fill="url(#grad-airflow)" />
    <text x="390" y="180" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">data_quality</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="150" width="180" height="50" rx="8" fill="url(#grad-airflow)" />
    <text x="610" y="180" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">data_archival</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="150" width="180" height="50" rx="8" fill="url(#grad-monitoring)" />
    <text x="830" y="180" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">alert_system</text>
  </g>

  <!-- Airflow DAGs Row 2 -->
  <g filter="url(#shadow)">
    <rect x="190" y="220" width="180" height="50" rx="8" fill="url(#grad-airflow)" />
    <text x="280" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">kafka_monitoring</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="410" y="220" width="180" height="50" rx="8" fill="url(#grad-airflow)" />
    <text x="500" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">kafka_producer_control</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="630" y="220" width="180" height="50" rx="8" fill="url(#grad-airflow)" />
    <text x="720" y="250" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">health_check_kafka</text>
  </g>

  <!-- --- CONNECTORS: Alert System Monitoring (Universal) --- -->
  <!-- Monitoring Kafka & Postgres -->
  <path d="M830,200 Q830,350 230,410" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowhead-red)" />
  <path d="M830,200 Q950,250 860,390" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowhead-red)" />

  <!-- Monitoring ALL other DAGs -->
  <path d="M830,200 Q700,80 170,145" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead-red)" />
  <path d="M830,200 Q600,100 390,145" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead-red)" />
  <path d="M830,200 Q720,130 610,145" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead-red)" />
  <path d="M830,200 Q500,230 280,215" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead-red)" />
  <path d="M830,200 Q650,230 500,215" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead-red)" />
  <path d="M830,200 Q830,250 720,215" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#arrowhead-red)" />

  <text x="830" y="90" font-family="Arial, sans-serif" font-size="10" fill="#fca5a5" text-anchor="middle">DAG Mesh Monitoring</text>

  <!-- --- MAIN COMPONENTS --- -->
  <!-- Kafka Cluster -->
  <g filter="url(#shadow)">
    <rect x="50" y="400" width="180" height="100" rx="12" fill="url(#grad-kafka)" />
    <text x="140" y="445" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Kafka Cluster</text>
  </g>

  <!-- Spark Streaming -->
  <g filter="url(#shadow)">
    <rect x="400" y="400" width="200" height="100" rx="12" fill="url(#grad-spark)" />
    <text x="500" y="445" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Spark Streaming</text>
  </g>

  <!-- PostgreSQL -->
  <g filter="url(#shadow)">
    <rect x="770" y="400" width="180" height="100" rx="12" fill="url(#grad-postgres)" />
    <text x="860" y="445" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">PostgreSQL</text>
  </g>

  <!-- Telegram -->
  <g filter="url(#shadow)">
    <rect x="740" y="620" width="180" height="80" rx="12" fill="#0284c7" />
    <text x="830" y="670" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Telegram Alert</text>
  </g>

  <!-- --- DATA FLOW CONNECTORS --- -->
  <line x1="230" y1="450" x2="390" y2="450" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="600" y1="450" x2="760" y2="450" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="830" y1="200" x2="830" y2="610" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)" />

</svg>
